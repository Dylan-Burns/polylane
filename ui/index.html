<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Watchtower — a production-watchdog agent that notices anomalies in a live service graph and investigates them like an SRE."
    />
    <!-- Instrument Sans (display + body) and JetBrains Mono (wordmark/data/timestamps/trace ids) —
         the polylane.com brand pairing; see ui/src/index.css's token comment. Falls back to system
         font stacks with zero layout shift risk when offline; the deployed site fetches these live. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Watchtower</title>
    <!-- Theme is applied before first paint (polylane.com-style light/dark toggle — tokens flip via
         html[data-theme] in index.css). Inline so a dark-mode user never sees a light flash. -->
    <script>
      // try/catch: with cookies/site-data blocked, touching localStorage throws SecurityError —
      // fall to the light default rather than dying before React boots.
      try {
        document.documentElement.dataset.theme = localStorage.getItem("wt-theme") === "dark" ? "dark" : "light";
      } catch (e) {
        document.documentElement.dataset.theme = "light";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
